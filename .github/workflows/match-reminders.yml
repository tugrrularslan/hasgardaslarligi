name: Match Reminder Cron

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  call-match-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Call Match Reminder API
        run: |
          curl -X GET \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          https://hasgardaslarligi.vercel.app/api/cron/match-reminders